<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>屏幕宽度获取</title>
  <style>
    body{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
    }
    #btn{
      width: 150px;
      height: 50px;
      background-color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div id="btn">获取屏幕宽度</div>
  <br>
  <div id="contentbox">
    <span id="content">宽度为</span>
    <span id="pixel">...</span>
    <span id="content">pixel</span>
  </div>
  <script>
    var btn = document.getElementById("btn");
    var width = 0;
    btn.addEventListener("click",function(){
      let width = window.innerWidth;
      document.getElementById("pixel").innerHTML = width;
    })
  </script>
</body>
</html>
